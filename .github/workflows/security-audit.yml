name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
 
jobs:    
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Audits only production dependencies (omits devDependencies).
      # Fails the job on high or critical severity findings.
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev